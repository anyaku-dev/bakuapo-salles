<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - ページが見つかりません | BakuApo</title>
    <link rel="icon" href="/favicon.ico">
    <link rel="apple-touch-icon" href="/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+JP:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        body{
            font-family:'Inter','Noto Sans JP',-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
            background:#FAFAFA;
            color:#111827;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            min-height:100vh;
            -webkit-font-smoothing:antialiased;
            overflow:hidden;
        }
        .container{
            display:flex;
            flex-direction:column;
            align-items:center;
            gap:32px;
            animation:fadeIn .8s ease-out;
        }
        .logo img{
            height:48px;
        }
        .code{
            font-size:clamp(100px, 20vw, 180px);
            font-weight:900;
            color:#D1D5DB;
            line-height:1;
            letter-spacing:-.04em;
            user-select:none;
        }
        .message{
            font-size:15px;
            color:#9CA3AF;
            text-align:center;
            line-height:1.8;
        }
        .back-link{
            display:inline-flex;
            align-items:center;
            gap:6px;
            font-size:14px;
            font-weight:600;
            color:#0852FF;
            text-decoration:none;
            padding:10px 24px;
            border-radius:10px;
            border:1px solid #E5E7EB;
            background:#fff;
            transition:all .2s;
        }
        .back-link:hover{
            background:#f0f4ff;
            border-color:#0852FF;
            transform:translateY(-1px);
        }
        @keyframes fadeIn{
            from{opacity:0;transform:translateY(16px)}
            to{opacity:1;transform:translateY(0)}
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <a href="/"><img src="/bakuapo-logo-useer.svg" alt="BakuApo"></a>
        </div>
        <div class="code">404</div>
        <p class="message">お探しのページは見つかりませんでした。</p>
        <a href="/" class="back-link">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8H4"/><path d="M7 5L4 8l3 3"/></svg>
            トップページへ戻る
        </a>
    </div>
</body>
</html>
